included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - "**/.build"
  - "**/.swiftpm"
  # Test fixtures (the bundled mock ACP agent is a Python script, not Swift).
  - Tests/SwiftACPTests/Fixtures
  - Tests/ACPTests/Fixtures

disabled_rules:
  # The Data -> String conversions here decode JSONEncoder output, which is
  # always valid UTF-8 — `String(decoding:as:)` is the correct non-optional
  # idiom, not the failable `String(bytes:encoding:)`.
  - optional_data_string_conversion

# 4-space indentation is enforced by SwiftFormat (`--indent 4`). SwiftLint's
# `indentation_width` rule is not enabled — it rejects the standard multi-line
# condition continuation style used throughout the sources.

identifier_name:
  # The ACP / Zed Codable conformances use single-letter locals idiomatically
  # (`c` = container, `v` = value, `s` = string) plus short loop/operator names;
  # allow them rather than rename hundreds of decode/encode sites.
  min_length:
    warning: 0
    error: 0
  # `ACP_PROTOCOL_VERSION` mirrors the ACP protocol version constant name; the
  # SCREAMING_SNAKE constants below mirror acpx 0.11.0's TypeScript constant
  # names verbatim (used by the CLI/daemon), for easy cross-referencing against
  # the upstream source.
  excluded:
    - ACP_PROTOCOL_VERSION
    - DEFAULT_AUTH_POLICY
    - DEFAULT_EVENT_MAX_SEGMENTS
    - DEFAULT_EVENT_SEGMENT_MAX_BYTES
    - DEFAULT_HISTORY_LIMIT
    - DEFAULT_NON_INTERACTIVE_PERMISSION_POLICY
    - DEFAULT_OUTPUT_FORMAT
    - DEFAULT_PERMISSION_MODE
    - DEFAULT_QUEUE_MAX_DEPTH
    - DEFAULT_TTL_MS
    - MAX_INLINE_CHARS
    - MAX_LOCATION_ITEMS
    - MAX_OUTPUT_CHARS
    - MAX_OUTPUT_LINES
    - MAX_THOUGHT_CHARS
    - OUTPUT_PRIORITY_KEYS
    - SESSION_INDEX_SCHEMA
    - SESSION_RECORD_SCHEMA
    - SUPPRESSED_READ_OUTPUT

# Doc comments and URLs (links to the ACP reference) shouldn't count against the
# code line limit.
line_length:
  ignores_comments: true
  ignores_urls: true

# Codable models for the ACP / Zed schemas nest types and their `CodingKeys` /
# payload structs — a standard Swift idiom the default `type_level: 1` is too
# strict to express.
nesting:
  type_level: 3

# Structural thresholds. The JSON-RPC dispatch, the session-update state machine,
# and the hand-written Codable `init(from:)` / `encode(to:)` are inherently
# branchy; the ACP launch / session-creation entry points carry wide parameter
# surfaces; and the daemon actor gathers every MCP tool (with full doc comments)
# in one file. A notch above the app-code defaults — still strict enough to catch
# new bloat.
file_length:
  warning: 500
  error: 800
type_body_length:
  warning: 450
  error: 600
cyclomatic_complexity:
  warning: 20
  error: 35
function_body_length:
  warning: 80
  error: 150
function_parameter_count:
  warning: 12
  error: 20
