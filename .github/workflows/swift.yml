---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      # JSONFoundation 2.1.x pulls swift-subprocess (a Swift 6.2 tools-version
      # package) into dependency *resolution* — even with its `Subprocess` trait
      # off — so the toolchain must be >= 6.2. `macos-latest` ships several Xcodes
      # and the default `swift` flapped between 6.1 (resolution fails) and 6.2
      # (passes) across runs; pin the latest stable Xcode for a deterministic
      # >= 6.2 toolchain.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build

  # On Linux and Windows the package is just the SwiftACP library + JSONFoundation:
  # the acpx CLI / acpxd daemon and their SwiftMCP + swift-nio + service-lifecycle
  # stack are gated to macOS in Package.swift (`#if os(macOS)`), so the resolved
  # graph stays nio-free and the whole package builds on Windows. The
  # subprocess-spawning integration tests are gated on `python3` being present (the
  # bundled mock-agent fixture), so on Windows they auto-skip and only the
  # pure-logic + loopback suites run.
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows)
        run: swift build --build-tests -v
      - name: Test (Windows)
        run: swift test -v --skip-build
