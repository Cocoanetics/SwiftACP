---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build

  # The SwiftACP library and the ACPXDaemonKit client library build for iOS: an iOS
  # app can't spawn agents, but it drives a remote acpxd over MCP via the generated
  # `ACPXDaemon.Client`. The last step proves the client-only graph stays nio-free —
  # SwiftMCP's swift-nio `Server` transports drop out when this package's `Server`
  # trait is disabled (which an iOS-only consumer does).
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build SwiftACP (iOS)
        run: xcodebuild -scheme SwiftACP -destination 'generic/platform=iOS' build
      - name: Build ACPXDaemonKit (iOS)
        run: xcodebuild -scheme ACPXDaemonKit -destination 'generic/platform=iOS' build
      - name: Build ACPXDaemonKit client-only — no swift-nio (Server trait off)
        run: swift build --target ACPXDaemonKit --disable-default-traits

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build

  # On Linux and Windows the package is just the SwiftACP library + JSONFoundation:
  # the acpx CLI / acpxd daemon and their SwiftMCP + swift-nio + service-lifecycle
  # stack are gated to macOS in Package.swift (`#if os(macOS)`), so the resolved
  # graph stays nio-free and the whole package builds on Windows. The
  # subprocess-spawning integration tests are gated on `python3` being present (the
  # bundled mock-agent fixture), so on Windows they auto-skip and only the
  # pure-logic + loopback suites run.
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows)
        run: swift build --build-tests -v
      - name: Test (Windows)
        run: swift test -v --skip-build
