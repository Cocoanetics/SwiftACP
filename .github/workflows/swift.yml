---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      # The macos-latest runner's Xcodes top out at 26.3 (Swift 6.2.4) — none here ship
      # Swift 6.3 (that's Xcode 26.4+, not on the image). So rather than select an Xcode,
      # install the swift.org 6.3 toolchain directly with the same action the Windows job
      # uses (it resolves swift.org releases dynamically, unlike a static Xcode catalog).
      # It layers on the runner's Xcode for the SDK and exports TOOLCHAINS so the steps
      # below build/test with 6.3. Swift 6.3 is what the swift-subprocess spawn-client
      # needs: on 6.2 its graph exhausts the resolver and its `Span` usage fails to load
      # libswiftCompatibilitySpan.dylib under swift-testing — both vanish on 6.3.
      - name: Install Swift 6.3
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      # Fail loudly if TOOLCHAINS didn't take and `swift` is still the Xcode 6.2 default,
      # rather than letting it resurface as a confusing libswiftCompatibilitySpan error.
      - name: Verify Swift version
        run: |
          swift --version
          swift --version | grep -qE "Swift version 6\.3" || { echo "::error::Expected Swift 6.3 (TOOLCHAINS=$TOOLCHAINS)"; exit 1; }
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build

  # SwiftACP builds for iOS: an iOS app can't spawn agents, but `import SwiftACP` gives
  # it the generated `ACPXDaemon.Client` to drive a remote acpxd over MCP. The
  # client-only step proves the graph stays swift-nio-free — SwiftMCP's `Server`
  # transports drop out when this package's `Server` trait is disabled, which is what
  # an iOS (or Android) consumer does.
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      # Building for iOS needs Xcode (xcodebuild + the iOS SDK), and the iOS build doesn't
      # need Swift 6.3 anyway: the spawn-client (with swift-subprocess/`Span`) is gated
      # off iOS and this job only builds (no tests), so the committed Package.resolved is
      # all 6.2 needs to resolve the graph. Pin 26.0 (the runner has no 6.3 Xcode regardless).
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      # This Xcode image ships without the iOS SDK preinstalled; fetch it.
      - name: Install the iOS platform
        run: xcodebuild -downloadPlatform iOS
      # -skipMacroValidation: SwiftACP uses SwiftMCP's `@MCPServer` macro, and
      # xcodebuild otherwise requires interactive trust of package macros.
      - name: Build SwiftACP (iOS, default traits)
        run: xcodebuild -scheme SwiftACP -destination 'generic/platform=iOS' -skipMacroValidation build
      - name: Build SwiftACP client-only — no swift-nio (Server trait off)
        run: swift build --target SwiftACP --disable-default-traits

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      # Client-only (Server trait off) so SwiftMCP's swift-nio transports stay out —
      # the acpx CLI / acpxd daemon are macOS-gated, so off-Apple only the SwiftACP
      # library (with SwiftMCP's nio-free Client) builds.
      - name: Build (Linux, client-only)
        run: swift build --build-tests -v --disable-default-traits
      - name: Test (Linux)
        run: swift test -v --skip-build --disable-default-traits

  # Off-Apple, the acpx CLI / acpxd daemon (and the swift-nio + service-lifecycle
  # stack) are macOS-gated (`#if os(macOS)`), so only the SwiftACP library builds —
  # with SwiftMCP's nio-free Client. The `Server` trait is disabled so swift-nio
  # stays out, which is what makes it build on Windows.
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows, client-only)
        run: swift build --build-tests -v --disable-default-traits
      - name: Test (Windows)
        run: swift test -v --skip-build --disable-default-traits

  # SwiftACP cross-compiles for Android as a client-only library — `import SwiftACP`
  # gives the generated `ACPXDaemon.Client` to drive a remote acpxd over MCP. The
  # spawn-client and acpx/acpxd are gated off Android, and the `Server` trait is
  # disabled so SwiftMCP's swift-nio transports stay out. Build the library sources
  # only: the tests reference the desktop-gated spawn-client, so they don't build off
  # desktop.
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Build (Android, client-only library)
        timeout-minutes: 25
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3.1"
          free-disk-space: true
          swift-build-flags: --disable-default-traits
          build-tests: false
          run-tests: false
