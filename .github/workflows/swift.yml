---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build

  # SwiftACP builds for iOS: an iOS app can't spawn agents, but `import SwiftACP` gives
  # it the generated `ACPXDaemon.Client` to drive a remote acpxd over MCP. The
  # client-only step proves the graph stays swift-nio-free — SwiftMCP's `Server`
  # transports drop out when this package's `Server` trait is disabled, which is what
  # an iOS (or Android) consumer does.
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build SwiftACP (iOS, default traits)
        run: xcodebuild -scheme SwiftACP -destination 'generic/platform=iOS' build
      - name: Build SwiftACP client-only — no swift-nio (Server trait off)
        run: swift build --target SwiftACP --disable-default-traits

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      # Client-only (Server trait off) so SwiftMCP's swift-nio transports stay out —
      # the acpx CLI / acpxd daemon are macOS-gated, so off-Apple only the SwiftACP
      # library (with SwiftMCP's nio-free Client) builds.
      - name: Build (Linux, client-only)
        run: swift build --build-tests -v --disable-default-traits
      - name: Test (Linux)
        run: swift test -v --skip-build --disable-default-traits

  # Off-Apple, the acpx CLI / acpxd daemon (and the swift-nio + service-lifecycle
  # stack) are macOS-gated (`#if os(macOS)`), so only the SwiftACP library builds —
  # with SwiftMCP's nio-free Client. The `Server` trait is disabled so swift-nio
  # stays out, which is what makes it build on Windows.
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows, client-only)
        run: swift build --build-tests -v --disable-default-traits
      - name: Test (Windows)
        run: swift test -v --skip-build --disable-default-traits
